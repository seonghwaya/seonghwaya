<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <!-- ========== 하늘 ========== -->
  <rect x="0" y="0" width="480" height="140" fill="#79B8E8"/>
  <rect x="0" y="140" width="480" height="20" fill="#9FD0F0"/>

  <!-- 태양 -->
  <g>
    <rect x="398" y="26" width="26" height="26" fill="#FFD75E"/>
    <rect x="394" y="32" width="4" height="14" fill="#FFD75E"/>
    <rect x="424" y="32" width="4" height="14" fill="#FFD75E"/>
    <rect x="404" y="22" width="14" height="4" fill="#FFD75E"/>
    <rect x="404" y="52" width="14" height="4" fill="#FFD75E"/>
    <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- 구름 -->
  <g fill="#FFFFFF" opacity="0.95">
    <g>
      <rect x="40" y="44" width="46" height="10"/>
      <rect x="48" y="36" width="28" height="8"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 460 0" dur="70s" repeatCount="indefinite"/>
    </g>
    <g>
      <rect x="200" y="72" width="36" height="8"/>
      <rect x="206" y="66" width="22" height="6"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 300 0" dur="90s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- 갈매기 -->
  <g fill="#3A3A3A">
    <rect x="0" y="58" width="7" height="3"/>
    <rect x="9" y="58" width="7" height="3"/>
    <rect x="6" y="56" width="4" height="3"/>
    <animateTransform attributeName="transform" type="translate" values="60 0; 420 -14; 60 0" dur="34s" repeatCount="indefinite"/>
  </g>
  <g fill="#3A3A3A" opacity="0.8">
    <rect x="0" y="58" width="6" height="3"/>
    <rect x="8" y="58" width="6" height="3"/>
    <rect x="5" y="56" width="4" height="3"/>
    <animateTransform attributeName="transform" type="translate" values="380 30; 40 12; 380 30" dur="46s" repeatCount="indefinite"/>
  </g>

  <!-- ========== 바다 ========== -->
  <rect x="0" y="160" width="480" height="72" fill="#1E5FA8"/>
  <line x1="-32" y1="172" x2="512" y2="172" stroke="#3D7FC4" stroke-width="5" stroke-dasharray="14 18">
    <animate attributeName="stroke-dashoffset" values="0;32" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="-32" y1="192" x2="512" y2="192" stroke="#5B9BD8" stroke-width="4" stroke-dasharray="10 22">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="-32" y1="212" x2="512" y2="212" stroke="#3D7FC4" stroke-width="5" stroke-dasharray="16 16">
    <animate attributeName="stroke-dashoffset" values="0;32" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- ========== 범선 ========== -->
  <g transform="translate(178,72)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 4; 0 0" dur="3.2s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-1.5 48 96; 1.5 48 96; -1.5 48 96" dur="4.6s" repeatCount="indefinite"/>

        <!-- 깃발 -->
        <rect x="30" y="6" width="18" height="7" fill="#C93A3A"/>
        <rect x="44" y="8" width="6" height="3" fill="#79B8E8"/>

        <!-- 돛대 -->
        <rect x="28" y="12" width="4" height="70" fill="#4A2E14"/>
        <rect x="62" y="28" width="4" height="54" fill="#4A2E14"/>
        <rect x="16" y="20" width="44" height="3" fill="#4A2E14"/>

        <!-- 주돛 -->
        <rect x="12" y="24" width="36" height="34" fill="#F5F1E6"/>
        <rect x="8"  y="30" width="4"  height="20" fill="#F5F1E6"/>
        <rect x="48" y="30" width="4"  height="20" fill="#F5F1E6"/>
        <rect x="12" y="52" width="36" height="6"  fill="#DDD5C0"/>
        <!-- 뒷돛 -->
        <rect x="52" y="38" width="26" height="24" fill="#F5F1E6"/>
        <rect x="78" y="42" width="4"  height="14" fill="#F5F1E6"/>
        <rect x="52" y="56" width="26" height="6"  fill="#DDD5C0"/>

        <!-- 선체 -->
        <rect x="4"  y="82" width="88" height="6"  fill="#A0642F"/>
        <rect x="0"  y="88" width="96" height="4"  fill="#E6C15A"/>
        <rect x="0"  y="92" width="96" height="10" fill="#8B5A2B"/>
        <rect x="8"  y="102" width="80" height="6" fill="#6E441F"/>
        <rect x="88" y="76" width="16" height="4"  fill="#8B5A2B"/>
      </g>
    </g>
    <!-- 물보라 -->
    <g fill="#FFFFFF">
      <rect x="-6" y="104" width="8" height="4">
        <animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="94" y="106" width="8" height="4">
        <animate attributeName="opacity" values="1;0;1" dur="1.9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ========== 대화창 ========== -->
  <rect x="12" y="232" width="456" height="60" fill="#F5F1E6"/>
  <rect x="16" y="236" width="448" height="52" fill="#0A1E4A"/>
  <rect x="18" y="238" width="444" height="48" fill="none" stroke="#E6C15A" stroke-width="1"/>

  <!-- 이름표 -->
  <rect x="24" y="222" width="66" height="17" fill="#0A1E4A" stroke="#F5F1E6" stroke-width="2"/>
  <text x="57" y="235" font-family="'DungGeunMo','Galmuri11',monospace" font-size="11" fill="#E6C15A" text-anchor="middle">항해사</text>

  <!-- 초상화 -->
  <rect x="26" y="244" width="38" height="38" fill="#122B54" stroke="#E6C15A" stroke-width="1"/>
  <rect x="33" y="254" width="24" height="22" fill="#F0C08A"/>
  <rect x="33" y="250" width="24" height="7"  fill="#2E6DB4"/>
  <rect x="55" y="252" width="6"  height="6"  fill="#2E6DB4"/>
  <rect x="38" y="262" width="4"  height="4"  fill="#222222"/>
  <rect x="49" y="262" width="4"  height="4"  fill="#222222"/>
  <rect x="42" y="270" width="8"  height="3"  fill="#A05A34"/>

  <!-- 대사 (3개 순환) -->
  <g font-family="'DungGeunMo','Galmuri11',monospace" font-size="14" fill="#F5F1E6">
    <text x="78" y="266">어서 오게, 항해사 성화!
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.30;0.333;0.966;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="78" y="266">오늘은 어느 바다로 떠나 볼 텐가?
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.366;0.633;0.666;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="78" y="266">순풍이 불고 있군. 출항하기 좋은 날이야.
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.666;0.70;0.966;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ▼ 진행 표시 -->
  <g fill="#E6C15A">
    <rect x="440" y="274" width="12" height="4"/>
    <rect x="444" y="278" width="4" height="4"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </g>
</svg>
